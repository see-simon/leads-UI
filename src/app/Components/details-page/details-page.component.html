<div class="container">

  <!-- HEADER -->
  <div class="header">
    <h2>{{ fileName }}</h2>
  </div>

  <!-- PDF CARD -->
  <div class="card" *ngIf="fileUrl">
    <iframe 
      [src]="fileUrl | safeUrl"
      width="100%" 
      height="500px">
    </iframe>
  </div>

  <div *ngIf="!fileUrl">
    <p>Loading document...</p>
  </div>

  <!-- BUTTON -->
  <div class="actions">
    <button (click)="openDialog()">Get in touch with consultant</button>
  </div>

</div>
